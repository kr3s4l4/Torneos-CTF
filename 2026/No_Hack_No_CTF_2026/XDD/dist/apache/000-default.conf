ServerName 127.0.0.1
ServerTokens Prod
ServerSignature Off
Listen 8080

<VirtualHost *:8080>
    ServerName 127.0.0.1
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
