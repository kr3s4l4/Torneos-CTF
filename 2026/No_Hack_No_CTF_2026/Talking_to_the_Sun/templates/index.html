{% extends "base.html" %}
{% block title %}SinGen Access{% endblock %}
{% block content %}
  <h1>SinGen</h1>
  <p class="subtitle">Create a personal lyric key from a verified account session.</p>

  <div class="split">
    <section>
      <h2>Sign in</h2>
      <form method="post" action="{{ url_for('login') }}">
        <label for="login-email">Email account</label>
        <input id="login-email" name="email" type="text" autocomplete="username" required>

        <label for="login-password">Password</label>
        <input id="login-password" name="password" type="password" autocomplete="current-password" required>

        <div class="actions">
          <button type="submit">Sign in</button>
        </div>
      </form>
    </section>

    <section>
      <h2>Create account</h2>
      <form method="post" action="{{ url_for('register') }}">
        <label for="register-email">Email account</label>
        <input id="register-email" name="email" type="text" autocomplete="username" required>

        <label for="register-password">Password</label>
        <input id="register-password" name="password" type="password" autocomplete="new-password" minlength="8" required>

        <div class="actions">
          <button type="submit">Create account</button>
        </div>
      </form>
    </section>
  </div>

  <p class="small-muted">One account can generate one signed line.</p>
{% endblock %}
